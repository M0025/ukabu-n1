name: Release

# 打 tag (vX.Y.Z) 即触发：在 Apple Silicon runner 上用 python.org 的 universal2
# Python 打一个 **通吃 Intel + Apple Silicon** 的 dmg，发到 Release。
# （GitHub 的 Intel macos-13 runner 已退役/不可用，故不再分架构跑，改 universal2 单包。）
# 未签名 / 未公证（个人开源项目）；用户首次打开需「右键 → 打开」，详见 README。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYVER: "3.13.1"

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # python.org 的 macos11 pkg 是 universal2（arm64 + x86_64），
      # 打出来的 .app 内嵌的 Python.framework 也是 universal2 → 能在 Intel 上跑。
      - name: Install universal2 Python
        run: |
          curl -fL -o python.pkg "https://www.python.org/ftp/python/${PYVER}/python-${PYVER}-macos11.pkg"
          sudo installer -pkg python.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.13/bin" >> "$GITHUB_PATH"

      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt py2app

      - name: Build app + dmg
        run: bash scripts/release.sh
        env:
          PYTHON: python3

      - name: Verify universal2
        run: |
          lipo -info dist/ukabu-n1.app/Contents/MacOS/python || true
          mv dist/ukabu-n1.dmg dist/ukabu-n1-universal.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ukabu-n1-universal.dmg
          body: |
            ## 下载
            `ukabu-n1-universal.dmg` —— **Intel 和 Apple Silicon 通用**，打开后把 **ukabu-n1** 拖进 Applications。

            未签名（个人开源项目），首次启动若被 Gatekeeper 拦：
            **右键点 app → 打开 → 再点「打开」**，或终端跑一次：
            `xattr -dr com.apple.quarantine /Applications/ukabu-n1.app`

            词库 / 音频首次使用时自动联网获取。
